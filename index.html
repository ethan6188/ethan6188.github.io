<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan's Blog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.7;
            color: #2c3e50;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            padding: 56px 48px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }
        header { margin-bottom: 40px; border-bottom: 1px solid #eef1f5; padding-bottom: 32px; }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #7f8c9a; font-size: 1.05rem; }
        h2 { font-size: 1.4rem; margin: 28px 0 12px; color: #34495e; }
        p { margin-bottom: 14px; color: #4a5568; }
        ul { margin: 12px 0 20px 24px; color: #4a5568; }
        li { margin-bottom: 6px; }
        code {
            background: #f1f3f7;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", Consolas, Monaco, monospace;
            font-size: 0.9em;
            color: #d63384;
        }
        footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #eef1f5;
            text-align: center;
            color: #95a5a6;
            font-size: 0.9rem;
        }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hello, I'm Ethan</h1>
            <p class="subtitle">这是我的第一版个人博客 · 托管在 GitHub Pages</p>
        </header>

        <h2>关于这里</h2>
        <p>这个页面是用纯 <code>HTML</code> 写的静态站点，部署在 <code>ethan.github.io</code>。</p>
        <p>后续会迁移到 <strong>Hugo + GitHub Actions</strong>，支持 Markdown 写作、主题、自动构建部署。</p>

        <h2>计划写点什么</h2>
        <ul>
            <li>工程实践与踩坑笔记</li>
            <li>系统设计与架构思考</li>
            <li>工具与效率</li>
            <li>读书和杂感</li>
        </ul>

        <footer>
            <p>© <span id="year"></span> Ethan · Powered by GitHub Pages</p>
        </footer>
    </div>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
