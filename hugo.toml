baseURL = "https://ethan6188.github.io/"
title = "Ethan's Blog"
theme = "PaperMod"

defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableEmoji = true
pagination.pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

# 各语言共用的 PaperMod 参数
[params]
  author = "Ethan"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = false
  DateFormat = "2006-01-02"

  [params.assets]
    disableHLJS = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# ---------------------------------------------------------------------------
# 中文（默认语言，站点根路径 /）
# ---------------------------------------------------------------------------
[languages.zh]
  languageName = "中文"
  languageCode = "zh-cn"
  weight = 1
  title = "Ethan's Blog"

  [languages.zh.params]
    description = "Ethan 的个人博客：工程实践、系统设计、工具与效率、读书与思考。"

    [languages.zh.params.homeInfoParams]
      Title = "Hi, I'm Ethan 👋"
      Content = """
欢迎来到我的博客。

我会在这里写：**工程实践与踩坑笔记**、**系统设计与架构思考**、**工具与效率**、以及**读书和生活杂感**。
"""

  [[languages.zh.params.socialIcons]]
    name = "github"
    url = "https://github.com/ethan6188"

  [[languages.zh.params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [[languages.zh.menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[languages.zh.menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20

  [[languages.zh.menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30

  [[languages.zh.menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40

# ---------------------------------------------------------------------------
# English（/en/ 前缀）
# ---------------------------------------------------------------------------
[languages.en]
  languageName = "English"
  languageCode = "en-us"
  weight = 2
  title = "Ethan's Blog"

  [languages.en.params]
    description = "Ethan's blog: engineering notes, system design, tooling, and reading."

    [languages.en.params.homeInfoParams]
      Title = "Hi, I'm Ethan 👋"
      Content = """
Welcome to my blog.

I write about **engineering practice**, **system design**, **tools & productivity**, and **reading & life notes**.
"""

  [[languages.en.params.socialIcons]]
    name = "github"
    url = "https://github.com/ethan6188"

  [[languages.en.params.socialIcons]]
    name = "rss"
    url = "/en/index.xml"

  [[languages.en.menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/en/posts/"
    weight = 10

  [[languages.en.menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/en/archives/"
    weight = 20

  [[languages.en.menu.main]]
    identifier = "search"
    name = "Search"
    url = "/en/search/"
    weight = 30

  [[languages.en.menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/en/tags/"
    weight = 40

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
  [markup.goldmark.renderer]
    unsafe = true
